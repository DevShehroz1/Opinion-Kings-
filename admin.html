<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Opinion Kings</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a; color: #e0e0e0; line-height: 1.5; min-height: 100vh;
    }

    /* ─── Login Screen ─── */
    #login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: #111; border: 1px solid #222; border-radius: 16px;
      padding: 40px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-card h1 { font-size: 24px; color: #d4a95a; margin-bottom: 6px; font-weight: 800; }
    .login-card p { color: #666; font-size: 14px; margin-bottom: 28px; }
    .login-card input {
      width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333;
      border-radius: 10px; color: #fff; font-size: 14px; margin-bottom: 14px;
      font-family: inherit; outline: none; transition: border-color .2s;
    }
    .login-card input:focus { border-color: #d4a95a; }
    .login-card input::placeholder { color: #555; }
    .btn-gold {
      padding: 12px 24px; background: #d4a95a; color: #000; border: none;
      border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px;
      font-family: inherit; width: 100%; transition: background .2s;
    }
    .btn-gold:hover { background: #c9a046; }
    .btn-gold:disabled { opacity: .5; cursor: not-allowed; }
    #login-error { color: #ff5555; margin-top: 14px; font-size: 13px; min-height: 20px; }

    /* ─── Dashboard Layout ─── */
    #dashboard { display: none; }

    .top-nav {
      position: sticky; top: 0; z-index: 100;
      background: #0a0a0a; border-bottom: 1px solid #1a1a1a;
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .top-nav h1 { font-size: 18px; color: #d4a95a; font-weight: 800; white-space: nowrap; }
    .top-nav-right { display: flex; align-items: center; gap: 12px; }
    .top-nav-right .admin-email { color: #666; font-size: 12px; }
    .btn-sm {
      padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0;
      font-family: inherit; transition: all .2s;
    }
    .btn-sm:hover { border-color: #d4a95a; color: #d4a95a; }
    .btn-logout { border-color: #ff5555; color: #ff5555; }
    .btn-logout:hover { background: #ff5555; color: #000; }

    .tab-nav {
      display: flex; gap: 0; border-bottom: 1px solid #1a1a1a;
      padding: 0 24px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-nav button {
      padding: 12px 20px; background: none; border: none; border-bottom: 2px solid transparent;
      color: #666; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; white-space: nowrap; transition: all .2s;
    }
    .tab-nav button:hover { color: #e0e0e0; }
    .tab-nav button.active { color: #d4a95a; border-bottom-color: #d4a95a; }

    .tab-content { display: none; padding: 24px; }
    .tab-content.active { display: block; }

    /* ─── Overview Cards ─── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #111; border: 1px solid #1a1a1a; border-radius: 12px;
      padding: 20px; text-align: center;
    }
    .stat-card .val { font-size: 32px; font-weight: 800; color: #d4a95a; }
    .stat-card .lbl { font-size: 12px; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }

    /* ─── Tables ─── */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #1a1a1a; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: #141414; color: #d4a95a; text-align: left; padding: 10px 14px;
      font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
      white-space: nowrap; position: sticky; top: 0;
    }
    td { padding: 8px 14px; border-top: 1px solid #1a1a1a; white-space: nowrap; }
    tr:hover td { background: #151515; }
    .flag-row td { background: rgba(255, 85, 85, 0.05); }
    .flag-text { color: #ff5555; font-weight: 600; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
    }
    .badge-vip { background: #d4a95a; color: #000; }
    .badge-pending { background: #333; color: #aaa; }
    .badge-distributed { background: #2a7a3a; color: #fff; }
    .badge-cancelled { background: #7a2a2a; color: #fff; }
    .badge-flagged { background: #ff5555; color: #fff; }

    /* ─── Controls ─── */
    .controls {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
    }
    .controls input, .controls select {
      padding: 8px 14px; background: #1a1a1a; border: 1px solid #333;
      border-radius: 8px; color: #e0e0e0; font-size: 13px; font-family: inherit; outline: none;
    }
    .controls input:focus, .controls select:focus { border-color: #d4a95a; }
    .controls input { flex: 1; min-width: 200px; }
    .controls select { min-width: 140px; }

    .pagination {
      display: flex; gap: 8px; justify-content: center; align-items: center; margin-top: 16px;
    }
    .pagination button {
      padding: 6px 12px; background: #1a1a1a; border: 1px solid #333;
      border-radius: 6px; color: #e0e0e0; font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .pagination button:hover { border-color: #d4a95a; }
    .pagination button:disabled { opacity: .3; cursor: not-allowed; }
    .pagination span { color: #666; font-size: 12px; }

    /* ─── Charts ─── */
    .bar-chart {
      display: flex; align-items: flex-end; gap: 4px; height: 220px;
      padding: 10px 0; overflow-x: auto; min-width: 100%;
    }
    .bar-col { display: flex; flex-direction: column; align-items: center; min-width: 36px; }
    .bar {
      width: 28px; background: #d4a95a; border-radius: 4px 4px 0 0;
      transition: height .3s; min-height: 2px;
    }
    .bar-label { font-size: 9px; color: #666; margin-top: 4px; writing-mode: vertical-rl; text-orientation: mixed; max-height: 60px; overflow: hidden; }
    .bar-count { font-size: 10px; color: #d4a95a; margin-bottom: 4px; }

    .h-bar-chart { margin: 16px 0; }
    .h-bar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 12px; }
    .h-bar-label { width: 110px; font-size: 12px; color: #999; text-align: right; flex-shrink: 0; }
    .h-bar-track { flex: 1; height: 24px; background: #1a1a1a; border-radius: 6px; overflow: hidden; }
    .h-bar-fill { height: 100%; background: #d4a95a; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; }
    .h-bar-val { font-size: 11px; color: #000; font-weight: 700; }

    .channel-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .channel-card {
      background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; text-align: center;
    }
    .channel-card .ch-name { font-size: 14px; font-weight: 700; color: #e0e0e0; text-transform: capitalize; }
    .channel-card .ch-count { font-size: 28px; font-weight: 800; color: #d4a95a; margin-top: 4px; }

    .section-title {
      font-size: 15px; color: #d4a95a; font-weight: 700; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: .04em;
    }

    .empty { color: #444; font-style: italic; padding: 20px; text-align: center; }

    .btn-action {
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid #2a7a3a; background: transparent; color: #2a7a3a;
      font-family: inherit; transition: all .2s;
    }
    .btn-action:hover { background: #2a7a3a; color: #fff; }
    .btn-action:disabled { opacity: .3; cursor: not-allowed; }
    .btn-cancel { border-color: #7a2a2a; color: #7a2a2a; }
    .btn-cancel:hover { background: #7a2a2a; color: #fff; }

    .loading { text-align: center; padding: 60px 20px; color: #666; }
    .spinner {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid #333; border-top-color: #d4a95a;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─── */
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .channel-cards { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr; }
      .channel-cards { grid-template-columns: 1fr; }
      .top-nav { padding: 12px 16px; }
      .tab-nav { padding: 0 16px; }
      .tab-content { padding: 16px; }
      .top-nav h1 { font-size: 15px; }
      table { font-size: 11px; }
      th, td { padding: 6px 10px; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <h1>Opinion Kings</h1>
    <p>Admin Dashboard — Sign in to continue</p>
    <input type="email" id="login-email" placeholder="Email address" autocomplete="email">
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    <button class="btn-gold" id="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav class="top-nav">
    <h1>Opinion Kings — Admin Dashboard</h1>
    <div class="top-nav-right">
      <span class="admin-email" id="admin-email-display"></span>
      <button class="btn-sm" onclick="refreshData()">Refresh</button>
      <button class="btn-sm btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <div class="tab-nav" id="tab-nav">
    <button class="active" data-tab="overview">Overview</button>
    <button data-tab="users">All Users</button>
    <button data-tab="referrals">Referrals</button>
    <button data-tab="shares">Shares</button>
    <button data-tab="credits">Credits</button>
    <button data-tab="flagged">Flagged</button>
    <button data-tab="timeline">Timeline</button>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p style="margin-top:12px;">Loading dashboard data...</p>
  </div>

  <!-- 1. Overview -->
  <div class="tab-content active" data-tab="overview" id="tab-overview">
    <div class="stats-grid" id="overview-stats"></div>
  </div>

  <!-- 2. All Users -->
  <div class="tab-content" data-tab="users" id="tab-users">
    <div class="controls">
      <input type="text" id="user-search" placeholder="Search name, email, or referral code...">
      <select id="user-filter">
        <option value="all">All Users</option>
        <option value="flagged">Flagged</option>
        <option value="vip">VIP</option>
        <option value="has_referrals">Has Referrals</option>
      </select>
      <select id="user-sort">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="most_referrals">Most Referrals</option>
        <option value="most_boost">Most Boost</option>
      </select>
    </div>
    <div class="table-wrap" id="users-table-wrap"></div>
    <div class="pagination" id="users-pagination"></div>
  </div>

  <!-- 3. Referral Analytics -->
  <div class="tab-content" data-tab="referrals" id="tab-referrals">
    <div class="section-title">Top Referrers (Top 50)</div>
    <div class="table-wrap" id="top-referrers-table"></div>
    <div class="section-title" style="margin-top:24px;">Referral Chains</div>
    <div class="controls">
      <input type="text" id="referral-search" placeholder="Search referral chains...">
    </div>
    <div class="table-wrap" id="referral-chains-table"></div>
    <div class="section-title" style="margin-top:24px;">Milestone Distribution</div>
    <div id="milestone-chart"></div>
  </div>

  <!-- 4. Share Analytics -->
  <div class="tab-content" data-tab="shares" id="tab-shares">
    <div class="section-title">Clicks by Channel</div>
    <div class="channel-cards" id="channel-cards"></div>
    <div class="section-title">Clicks Over Time</div>
    <div style="overflow-x:auto;">
      <div class="bar-chart" id="share-time-chart"></div>
    </div>
    <div class="section-title" style="margin-top:24px;">Top Sharers</div>
    <div class="table-wrap" id="top-sharers-table"></div>
  </div>

  <!-- 5. Credits Ledger -->
  <div class="tab-content" data-tab="credits" id="tab-credits">
    <div class="section-title">Credits Ledger</div>
    <div class="table-wrap" id="credits-table-wrap"></div>
  </div>

  <!-- 6. Flagged Users & Fraud -->
  <div class="tab-content" data-tab="flagged" id="tab-flagged">
    <div class="section-title">Flagged Users</div>
    <div class="table-wrap" id="flagged-table-wrap"></div>
    <div class="section-title" style="margin-top:24px;">IP Clusters (3+ Signups)</div>
    <div class="table-wrap" id="ip-clusters-table"></div>
  </div>

  <!-- 7. Signup Timeline -->
  <div class="tab-content" data-tab="timeline" id="tab-timeline">
    <div class="section-title">Signups Per Day</div>
    <div style="overflow-x:auto;">
      <div class="bar-chart" id="timeline-chart"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var API_BASE = '/api/waitlist/admin';
  var token = localStorage.getItem('admin_token') || '';
  var adminEmail = localStorage.getItem('admin_email') || '';
  var DATA = null;
  var usersPage = 1;
  var USERS_PER_PAGE = 50;
  var searchDebounce = null;

  // Auto-login if token exists
  if (token) tryAutoLogin();

  // ─── Login ───
  window.doLogin = function() {
    var email = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    var errEl = document.getElementById('login-error');
    var btn = document.getElementById('login-btn');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please enter email and password.'; return; }
    btn.disabled = true; btn.textContent = 'Signing in...';

    fetch(API_BASE + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
    .then(function(r) {
      if (r.status !== 200 || r.data.error) {
        errEl.textContent = r.data.error || 'Login failed.';
        btn.disabled = false; btn.textContent = 'Sign In';
        return;
      }
      token = r.data.token;
      adminEmail = r.data.email;
      localStorage.setItem('admin_token', token);
      localStorage.setItem('admin_email', adminEmail);
      showDashboard();
    })
    .catch(function() {
      errEl.textContent = 'Network error. Please try again.';
      btn.disabled = false; btn.textContent = 'Sign In';
    });
  };

  function tryAutoLogin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('admin-email-display').textContent = adminEmail;
    loadData();
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('admin-email-display').textContent = adminEmail;
    loadData();
  }

  window.doLogout = function() {
    token = ''; adminEmail = '';
    localStorage.removeItem('admin_token');
    localStorage.removeItem('admin_email');
    DATA = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
  };

  window.refreshData = function() { loadData(); };

  function loadData() {
    document.getElementById('loading').style.display = 'block';
    document.querySelectorAll('.tab-content').forEach(function(el) { el.style.visibility = 'hidden'; });

    fetch(API_BASE + '/data', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(r) {
      if (r.status === 401) { window.doLogout(); throw new Error('Session expired'); }
      return r.json();
    })
    .then(function(d) {
      if (d.error) throw new Error(d.error);
      DATA = d;
      document.getElementById('loading').style.display = 'none';
      document.querySelectorAll('.tab-content').forEach(function(el) { el.style.visibility = 'visible'; });
      renderAll();
    })
    .catch(function(e) {
      document.getElementById('loading').innerHTML = '<p style="color:#ff5555;">Failed to load data: ' + esc(e.message) + '</p>';
    });
  }

  // ─── Tab Navigation ───
  document.getElementById('tab-nav').addEventListener('click', function(e) {
    if (e.target.tagName !== 'BUTTON') return;
    var tab = e.target.getAttribute('data-tab');
    document.querySelectorAll('.tab-nav button').forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
    document.querySelector('.tab-content[data-tab="' + tab + '"]').classList.add('active');
  });

  document.getElementById('login-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.doLogin();
  });
  document.getElementById('login-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-password').focus();
  });

  // ─── Render All ───
  function renderAll() {
    if (!DATA) return;
    renderOverview();
    renderUsers();
    renderReferrals();
    renderShares();
    renderCredits();
    renderFlagged();
    renderTimeline();
  }

  // ─── 1. Overview ───
  function renderOverview() {
    var o = DATA.overview;
    var html = '';
    html += statCard(o.total_users, 'Total Users');
    html += statCard(o.spots_remaining, 'Spots Remaining');
    html += statCard(o.total_referrals, 'Total Referrals');
    html += statCard('$' + (o.total_credits_pending / 100).toFixed(0), 'Pending Credits');
    html += statCard(o.flagged_count, 'Flagged');
    html += statCard(o.vip_count, 'VIP Members');
    html += statCard(o.share_clicks, 'Share Clicks');
    html += statCard(o.international_count, 'International');
    document.getElementById('overview-stats').innerHTML = html;
  }

  function statCard(val, lbl) {
    return '<div class="stat-card"><div class="val">' + val + '</div><div class="lbl">' + lbl + '</div></div>';
  }

  // ─── 2. All Users ───
  function renderUsers() {
    var users = getFilteredUsers();
    var total = users.length;
    var totalPages = Math.max(1, Math.ceil(total / USERS_PER_PAGE));
    if (usersPage > totalPages) usersPage = totalPages;
    var start = (usersPage - 1) * USERS_PER_PAGE;
    var page = users.slice(start, start + USERS_PER_PAGE);

    var h = '<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Code</th><th>Rank</th><th>Referrals</th><th>Boost</th><th>Credits</th><th>VIP</th><th>IP</th><th>Flagged</th><th>Country</th><th>Joined</th></tr>';
    if (page.length === 0) {
      h += '<tr><td colspan="14" class="empty">No users match your criteria.</td></tr>';
    }
    page.forEach(function(u) {
      var flagClass = u.flagged_reason ? ' class="flag-row"' : '';
      h += '<tr' + flagClass + '>';
      h += '<td>' + u.id + '</td>';
      h += '<td>' + esc(u.full_name) + '</td>';
      h += '<td>' + esc(u.email) + '</td>';
      h += '<td>' + esc(u.phone || '') + '</td>';
      h += '<td>' + esc(u.referral_code) + '</td>';
      h += '<td>' + (u._rank || '-') + '</td>';
      h += '<td>' + (u.referral_count || 0) + '</td>';
      h += '<td>' + (u.boost_points || 0) + '</td>';
      h += '<td>$' + ((u.credits_earned || 0) / 100).toFixed(0) + '</td>';
      h += '<td>' + (u.vip_badge ? '<span class="badge badge-vip">VIP</span>' : '') + '</td>';
      h += '<td>' + esc(u.ip_address || '') + '</td>';
      h += '<td>' + (u.flagged_reason ? '<span class="flag-text">' + esc(u.flagged_reason) + '</span>' : '') + '</td>';
      h += '<td>' + esc(u.country_code || '') + '</td>';
      h += '<td>' + shortDate(u.created_at) + '</td>';
      h += '</tr>';
      if (u.referrer_email) {
        h += '<tr style="background:#0d0d0d;"><td></td><td colspan="13" style="font-size:11px;color:#666;">Referred by: ' + esc(u.referrer_email) + '</td></tr>';
      }
    });
    h += '</table>';
    document.getElementById('users-table-wrap').innerHTML = h;

    var ph = '';
    ph += '<button onclick="usersPageNav(-1)"' + (usersPage <= 1 ? ' disabled' : '') + '>&laquo; Prev</button>';
    ph += '<span>Page ' + usersPage + ' of ' + totalPages + ' (' + total + ' users)</span>';
    ph += '<button onclick="usersPageNav(1)"' + (usersPage >= totalPages ? ' disabled' : '') + '>Next &raquo;</button>';
    document.getElementById('users-pagination').innerHTML = ph;
  }

  function getFilteredUsers() {
    if (!DATA || !DATA.all_users) return [];
    var users = DATA.all_users.slice();
    var filter = document.getElementById('user-filter').value;
    var search = (document.getElementById('user-search').value || '').toLowerCase().trim();
    var sort = document.getElementById('user-sort').value;

    if (filter === 'flagged') users = users.filter(function(u) { return u.flagged_reason; });
    else if (filter === 'vip') users = users.filter(function(u) { return u.vip_badge; });
    else if (filter === 'has_referrals') users = users.filter(function(u) { return u.referral_count > 0; });

    if (search) {
      users = users.filter(function(u) {
        return (u.full_name || '').toLowerCase().indexOf(search) !== -1 ||
               (u.email || '').toLowerCase().indexOf(search) !== -1 ||
               (u.referral_code || '').toLowerCase().indexOf(search) !== -1;
      });
    }

    if (sort === 'newest') users.sort(function(a, b) { return (b.created_at || '').localeCompare(a.created_at || ''); });
    else if (sort === 'oldest') users.sort(function(a, b) { return (a.created_at || '').localeCompare(b.created_at || ''); });
    else if (sort === 'most_referrals') users.sort(function(a, b) { return (b.referral_count || 0) - (a.referral_count || 0); });
    else if (sort === 'most_boost') users.sort(function(a, b) { return (b.boost_points || 0) - (a.boost_points || 0); });

    return users;
  }

  window.usersPageNav = function(dir) { usersPage += dir; renderUsers(); };

  document.getElementById('user-search').addEventListener('input', function() {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function() { usersPage = 1; renderUsers(); }, 250);
  });
  document.getElementById('user-filter').addEventListener('change', function() { usersPage = 1; renderUsers(); });
  document.getElementById('user-sort').addEventListener('change', function() { usersPage = 1; renderUsers(); });

  // ─── 3. Referral Analytics ───
  function renderReferrals() {
    var refs = DATA.top_referrers || [];
    if (refs.length === 0) {
      document.getElementById('top-referrers-table').innerHTML = '<p class="empty">No referrers yet.</p>';
    } else {
      var h = '<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Code</th><th>Referrals</th><th>Credits</th><th>VIP</th><th>IP</th></tr>';
      refs.forEach(function(u) {
        h += '<tr><td>' + u.id + '</td><td>' + esc(u.full_name) + '</td><td>' + esc(u.email) + '</td><td>' + esc(u.referral_code) + '</td><td>' + (u.referral_count || 0) + '</td><td>$' + ((u.credits_earned || 0) / 100).toFixed(0) + '</td><td>' + (u.vip_badge ? '<span class="badge badge-vip">VIP</span>' : '') + '</td><td>' + esc(u.ip_address || '') + '</td></tr>';
      });
      h += '</table>';
      document.getElementById('top-referrers-table').innerHTML = h;
    }

    renderReferralChains();

    var milestones = DATA.milestone_distribution || [];
    if (milestones.length === 0) {
      document.getElementById('milestone-chart').innerHTML = '<p class="empty">No data.</p>';
    } else {
      var maxCount = Math.max.apply(null, milestones.map(function(m) { return m.count; })) || 1;
      var mh = '<div class="h-bar-chart">';
      milestones.forEach(function(m) {
        var pct = Math.max(1, (m.count / maxCount) * 100);
        mh += '<div class="h-bar-row"><div class="h-bar-label">' + esc(m.tier) + '</div><div class="h-bar-track"><div class="h-bar-fill" style="width:' + pct + '%"><span class="h-bar-val">' + m.count + '</span></div></div></div>';
      });
      mh += '</div>';
      document.getElementById('milestone-chart').innerHTML = mh;
    }
  }

  function renderReferralChains() {
    var chains = DATA.referral_chains || [];
    var search = (document.getElementById('referral-search').value || '').toLowerCase().trim();
    if (search) {
      chains = chains.filter(function(r) {
        return (r.referrer_email || '').toLowerCase().indexOf(search) !== -1 ||
               (r.referred_email || '').toLowerCase().indexOf(search) !== -1 ||
               (r.referrer_name || '').toLowerCase().indexOf(search) !== -1 ||
               (r.referred_name || '').toLowerCase().indexOf(search) !== -1;
      });
    }
    if (chains.length === 0) {
      document.getElementById('referral-chains-table').innerHTML = '<p class="empty">No referral chains' + (search ? ' matching search' : '') + '.</p>';
    } else {
      var h = '<table><tr><th>Referrer</th><th>Referrer Email</th><th>Referred</th><th>Referred Email</th><th>Status</th><th>Date</th></tr>';
      chains.slice(0, 200).forEach(function(r) {
        h += '<tr><td>' + esc(r.referrer_name || '') + '</td><td>' + esc(r.referrer_email || '') + '</td><td>' + esc(r.referred_name || '') + '</td><td>' + esc(r.referred_email || '') + '</td><td>' + esc(r.status || '') + '</td><td>' + shortDate(r.created_at) + '</td></tr>';
      });
      h += '</table>';
      document.getElementById('referral-chains-table').innerHTML = h;
    }
  }

  document.getElementById('referral-search').addEventListener('input', function() {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(renderReferralChains, 250);
  });

  // ─── 4. Share Analytics ───
  function renderShares() {
    var stats = DATA.share_stats || [];
    var channels = ['twitter', 'whatsapp', 'copy'];
    var ch = '';
    channels.forEach(function(c) {
      var found = stats.find(function(s) { return s.channel === c; });
      var count = found ? found.clicks : 0;
      ch += '<div class="channel-card"><div class="ch-name">' + esc(c) + '</div><div class="ch-count">' + count + '</div></div>';
    });
    document.getElementById('channel-cards').innerHTML = ch;

    var clicks = DATA.share_clicks_detail || [];
    var clicksByDay = {};
    clicks.forEach(function(c) {
      var day = (c.created_at || '').slice(0, 10);
      if (day) clicksByDay[day] = (clicksByDay[day] || 0) + 1;
    });
    var days = Object.entries(clicksByDay).sort(function(a, b) { return a[0].localeCompare(b[0]); });
    if (days.length === 0) {
      document.getElementById('share-time-chart').innerHTML = '<p class="empty">No share click data.</p>';
    } else {
      var maxC = Math.max.apply(null, days.map(function(d) { return d[1]; })) || 1;
      var bh = '';
      days.forEach(function(d) {
        var h = Math.max(2, (d[1] / maxC) * 180);
        bh += '<div class="bar-col"><div class="bar-count">' + d[1] + '</div><div class="bar" style="height:' + h + 'px"></div><div class="bar-label">' + d[0].slice(5) + '</div></div>';
      });
      document.getElementById('share-time-chart').innerHTML = bh;
    }

    var sharerMap = {};
    clicks.forEach(function(c) {
      if (!sharerMap[c.user_id]) sharerMap[c.user_id] = { user_id: c.user_id, email: c.email, full_name: c.full_name, total: 0, twitter: 0, whatsapp: 0, copy: 0 };
      sharerMap[c.user_id].total++;
      if (sharerMap[c.user_id][c.channel] !== undefined) sharerMap[c.user_id][c.channel]++;
    });
    var sharers = Object.values(sharerMap).sort(function(a, b) { return b.total - a.total; }).slice(0, 20);
    if (sharers.length === 0) {
      document.getElementById('top-sharers-table').innerHTML = '<p class="empty">No sharers yet.</p>';
    } else {
      var h = '<table><tr><th>Name</th><th>Email</th><th>Total</th><th>Twitter</th><th>WhatsApp</th><th>Copy</th></tr>';
      sharers.forEach(function(s) {
        h += '<tr><td>' + esc(s.full_name || '') + '</td><td>' + esc(s.email || '') + '</td><td>' + s.total + '</td><td>' + s.twitter + '</td><td>' + s.whatsapp + '</td><td>' + s.copy + '</td></tr>';
      });
      h += '</table>';
      document.getElementById('top-sharers-table').innerHTML = h;
    }
  }

  // ─── 5. Credits Ledger ───
  function renderCredits() {
    var ledger = DATA.credits_ledger || [];
    if (ledger.length === 0) {
      document.getElementById('credits-table-wrap').innerHTML = '<p class="empty">No credits ledger entries.</p>';
      return;
    }
    var h = '<table><tr><th>ID</th><th>Email</th><th>Name</th><th>Code</th><th>Referrals</th><th>Credits</th><th>VIP</th><th>Status</th><th>Updated</th><th>Actions</th></tr>';
    ledger.forEach(function(l) {
      var badgeClass = l.status === 'distributed' ? 'badge-distributed' : l.status === 'cancelled' ? 'badge-cancelled' : 'badge-pending';
      h += '<tr>';
      h += '<td>' + l.id + '</td>';
      h += '<td>' + esc(l.email) + '</td>';
      h += '<td>' + esc(l.full_name || '') + '</td>';
      h += '<td>' + esc(l.referral_code) + '</td>';
      h += '<td>' + (l.referral_count || 0) + '</td>';
      h += '<td>$' + ((l.total_credits || 0) / 100).toFixed(0) + '</td>';
      h += '<td>' + (l.vip_badge ? '<span class="badge badge-vip">VIP</span>' : '') + '</td>';
      h += '<td><span class="badge ' + badgeClass + '">' + esc(l.status) + '</span></td>';
      h += '<td>' + shortDate(l.last_updated) + '</td>';
      h += '<td>';
      if (l.status === 'pending') {
        h += '<button class="btn-action" onclick="updateLedger(' + l.id + ',\'distributed\',this)">Distribute</button> ';
        h += '<button class="btn-action btn-cancel" onclick="updateLedger(' + l.id + ',\'cancelled\',this)">Cancel</button>';
      } else if (l.status === 'distributed') {
        h += '<button class="btn-action btn-cancel" onclick="updateLedger(' + l.id + ',\'cancelled\',this)">Cancel</button>';
      } else if (l.status === 'cancelled') {
        h += '<button class="btn-action" onclick="updateLedger(' + l.id + ',\'pending\',this)">Reopen</button>';
      }
      h += '</td></tr>';
    });
    h += '</table>';
    document.getElementById('credits-table-wrap').innerHTML = h;
  }

  window.updateLedger = function(id, newStatus, btn) {
    btn.disabled = true; btn.textContent = '...';
    fetch(API_BASE + '/ledger?id=' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ status: newStatus })
    })
    .then(function(r) {
      if (r.status === 401) { window.doLogout(); return; }
      return r.json();
    })
    .then(function(d) {
      if (d && d.ok) {
        var entry = DATA.credits_ledger.find(function(l) { return l.id === id; });
        if (entry) entry.status = newStatus;
        renderCredits();
      } else {
        btn.disabled = false; btn.textContent = 'Error';
      }
    })
    .catch(function() { btn.disabled = false; btn.textContent = 'Error'; });
  };

  // ─── 6. Flagged Users & Fraud ───
  function renderFlagged() {
    var flagged = DATA.flagged_users || [];
    if (flagged.length === 0) {
      document.getElementById('flagged-table-wrap').innerHTML = '<p class="empty">No flagged users.</p>';
    } else {
      var h = '<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Code</th><th>Referrals</th><th>IP</th><th>Reason</th><th>Joined</th></tr>';
      flagged.forEach(function(u) {
        h += '<tr class="flag-row"><td>' + u.id + '</td><td>' + esc(u.full_name) + '</td><td>' + esc(u.email) + '</td><td>' + esc(u.referral_code) + '</td><td>' + (u.referral_count || 0) + '</td><td>' + esc(u.ip_address || '') + '</td><td><span class="flag-text">' + esc(u.flagged_reason) + '</span></td><td>' + shortDate(u.created_at) + '</td></tr>';
      });
      h += '</table>';
      document.getElementById('flagged-table-wrap').innerHTML = h;
    }

    var clusters = DATA.ip_clusters || [];
    if (clusters.length === 0) {
      document.getElementById('ip-clusters-table').innerHTML = '<p class="empty">No suspicious IP clusters.</p>';
    } else {
      var h = '<table><tr><th>IP Address</th><th>Count</th><th>Severity</th><th>Associated Emails</th></tr>';
      clusters.forEach(function(c) {
        var sev = c.cnt >= 10 ? 'badge-cancelled' : c.cnt >= 5 ? 'badge-flagged' : 'badge-pending';
        var sevLabel = c.cnt >= 10 ? 'Critical' : c.cnt >= 5 ? 'High' : 'Medium';
        h += '<tr><td>' + esc(c.ip_address) + '</td><td>' + c.cnt + '</td><td><span class="badge ' + sev + '">' + sevLabel + '</span></td><td style="white-space:normal;max-width:400px;">' + esc(c.emails) + '</td></tr>';
      });
      h += '</table>';
      document.getElementById('ip-clusters-table').innerHTML = h;
    }
  }

  // ─── 7. Signup Timeline ───
  function renderTimeline() {
    var days = DATA.signups_by_day || [];
    if (days.length === 0) {
      document.getElementById('timeline-chart').innerHTML = '<p class="empty">No signup data.</p>';
      return;
    }
    var maxCount = Math.max.apply(null, days.map(function(d) { return d.count; })) || 1;
    var bh = '';
    days.forEach(function(d) {
      var h = Math.max(2, (d.count / maxCount) * 180);
      bh += '<div class="bar-col"><div class="bar-count">' + d.count + '</div><div class="bar" style="height:' + h + 'px"></div><div class="bar-label">' + d.date.slice(5) + '</div></div>';
    });
    document.getElementById('timeline-chart').innerHTML = bh;
  }

  // ─── Utilities ───
  function esc(s) {
    if (s === null || s === undefined) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function shortDate(s) {
    if (!s) return '';
    try {
      var d = new Date(s);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch(e) { return s; }
  }
})();
</script>
</body>
</html>
